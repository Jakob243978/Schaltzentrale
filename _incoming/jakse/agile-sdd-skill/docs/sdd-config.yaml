# SDD-Verifier-Konfiguration fuer den Skill "agile-sdd-skill"
# Self-contained SDD+PO-Projekt (dezentralisiert aus skill_dev/, 2026-07-12).
# Wird vom Verifier-Subagent (/sdd-verify) als ERSTES gelesen.

sdd_verifier:
  test_command: 'echo "Doc-/Methodik-Skill: keine pytest-Suite; Verifikation via Review + Dogfood"'
  health_check: 'python -c "print(1)"'
  ticket_path: "docs/tickets/"
  verify_report_path: "docs/tickets/verify/"
  # Skills sind headless Methodik-/Tooling-Artefakte -> keine UI-Klick-Abnahme noetig.
  manual_verify_required: false
  property_based_tests_enabled: false
  approach_block_required_for_ML: false
  enabled: true
